services:
  - type: web
    name: retailflow-api
    runtime: node
    buildCommand: npm ci && npm run build --workspace @retailflow/shared && npm run build --workspace backend && mkdir -p backend/models && ([ -f backend/models/yolov8n.onnx ] || curl -fsSL -o backend/models/yolov8n.onnx "https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.onnx" || echo "Model download skipped - grid fallback will be used")
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8787
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"

  - type: static
    name: retailflow-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
